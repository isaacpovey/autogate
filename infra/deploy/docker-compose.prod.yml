name: autogate

# Production stack: postgres + qdrant + api + worker + web, all behind a single
# Caddy HTTPS endpoint. Only Caddy publishes host ports (80/443); every other
# service is reachable only on the internal compose network.
#
# Build context is the repo root (two levels up from this file).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: autogate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autogate}
      POSTGRES_DB: autogate
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autogate -d autogate"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: 4000
      WEB_ORIGIN: ${PUBLIC_URL:-https://autogate.tyrongarratt.com}
      DATABASE_URL: postgres://autogate:${POSTGRES_PASSWORD:-autogate}@postgres:5432/autogate
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_WEBHOOK_PROXY_URL: ${GITHUB_WEBHOOK_PROXY_URL:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://autogate:${POSTGRES_PASSWORD:-autogate}@postgres:5432/autogate
      QDRANT_URL: http://qdrant:6333
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-2000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infra/Dockerfile.web
      args:
        # Inlined into the client bundle at build time (browser API base URL).
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-https://autogate.tyrongarratt.com}/api
    restart: unless-stopped
    environment:
      # Server-side (RSC) calls stay on the internal network and never loop out
      # through the public TLS endpoint. The browser API base URL is inlined at
      # build time (see build args above), so it is intentionally not repeated
      # here as runtime env would have no effect on the client bundle.
      INTERNAL_API_URL: http://api:4000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-autogate.tyrongarratt.com}
      # "tls internal" pre-DNS; set empty (TLS_DIRECTIVE=) for real ACME certs.
      TLS_DIRECTIVE: ${TLS_DIRECTIVE:-tls internal}
      ACME_EMAIL: ${ACME_EMAIL:-admin@tyrongarratt.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres-data:
  qdrant-data:
  caddy-data:
  caddy-config:
